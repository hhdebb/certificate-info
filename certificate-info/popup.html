<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Certificate Info</title>
  <link rel="stylesheet" href="popup.css">
  <script src="popup.js" defer></script>
</head>
<body>
  <header class="result-banner">
    <span id="validationResult" class="result-label" data-i18n="popupNoPage">No HTTP(S) page loaded</span>
  </header>

  <main class="content">
    <p id="message" class="message" data-i18n="popupIntro">
      Certificate information will display here when you open an HTTPS page.
    </p>

    <section id="identitySection" class="section" hidden>
      <div class="section-label" data-i18n="sectionOrganization">Organization</div>
      <div id="subjectOrganization" class="section-value strong"></div>
    </section>

    <section id="issuerSection" class="section" hidden>
      <div class="section-label" data-i18n="sectionIssuer">Issuer</div>
      <div id="issuerOrganization" class="section-value strong"></div>
      <div id="issuerCommonName" class="section-value subtle"></div>
    </section>

    <section id="expirationSection" class="section" hidden>
      <div class="section-label" data-i18n="sectionExpires">Expires</div>
      <div id="expirationDate" class="section-value strong"></div>
      <div id="expirationMessage" class="section-value subtle"></div>
    </section>
  </main>
</body>
</html>
